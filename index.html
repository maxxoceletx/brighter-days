<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brighter Days</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Brighter Days">
  <meta name="theme-color" content="#ffffff">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; }

    header {
      background: #fff; border-bottom: 1px solid #e0e0e0; padding: 20px 32px;
    }
    header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
    header p { font-size: 13px; color: #888; margin-top: 4px; }

    .progress-bar-container {
      margin-top: 12px; background: #e9ecef; border-radius: 8px; height: 8px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; background: #4caf50; border-radius: 8px; transition: width 0.3s ease;
    }
    .progress-text { font-size: 12px; color: #888; margin-top: 4px; }

    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 24px 32px; max-width: 1200px; align-items: start; }

    .panel {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px;
    }
    .panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }

    /* Checklist */
    .step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .step:last-child { border-bottom: none; }
    .step input[type="checkbox"] {
      margin-top: 3px; width: 18px; height: 18px; cursor: pointer; accent-color: #4caf50; flex-shrink: 0;
    }
    .step-content { flex: 1; }
    .step-title { font-size: 14px; font-weight: 500; }
    .step-title.done { text-decoration: line-through; color: #999; }
    .step-desc { font-size: 12px; color: #888; margin-top: 2px; }
    .step-number { font-size: 12px; color: #aaa; font-weight: 600; min-width: 20px; margin-top: 2px; }

    /* Document vault */
    .doc-group { margin-bottom: 16px; }
    .doc-group-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #f0f0f0; }
    .doc-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px;
    }
    .doc-name { flex: 1; }
    .doc-name a { color: #1976d2; text-decoration: none; }
    .doc-name a:hover { text-decoration: underline; }
    .doc-status {
      font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; cursor: pointer; border: none;
    }
    .doc-status.needed { background: #fff3e0; color: #e65100; }
    .doc-status.uploaded { background: #e3f2fd; color: #1565c0; }
    .doc-status.filed { background: #e8f5e9; color: #2e7d32; }
    .doc-notes { font-size: 11px; color: #999; }
    .doc-delete { cursor: pointer; color: #ccc; font-size: 16px; border: none; background: none; }
    .doc-delete:hover { color: #e53935; }

    /* Add doc form */
    .add-doc-btn {
      font-size: 12px; color: #1976d2; cursor: pointer; border: none; background: none;
      padding: 4px 0; margin-top: 4px;
    }
    .add-doc-btn:hover { text-decoration: underline; }
    .add-doc-form {
      display: none; background: #fafafa; border: 1px solid #e0e0e0; border-radius: 6px;
      padding: 12px; margin-top: 8px;
    }
    .add-doc-form.visible { display: block; }
    .add-doc-form input, .add-doc-form select, .add-doc-form textarea {
      width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px;
      font-size: 13px; margin-bottom: 8px; font-family: inherit;
    }
    .add-doc-form textarea { resize: vertical; height: 50px; }
    .add-doc-form label { font-size: 12px; color: #666; display: block; margin-bottom: 2px; }
    .form-actions { display: flex; gap: 8px; }
    .btn {
      padding: 6px 14px; border-radius: 4px; border: none; font-size: 12px; cursor: pointer; font-weight: 500;
    }
    .btn-primary { background: #1976d2; color: #fff; }
    .btn-primary:hover { background: #1565c0; }
    .btn-secondary { background: #e0e0e0; color: #555; }
    .btn-secondary:hover { background: #d0d0d0; }

    .empty { font-size: 13px; color: #aaa; font-style: italic; padding: 8px 0; }
    .loading { text-align: center; padding: 40px; color: #aaa; }
  </style>
</head>
<body>

<header>
  <h1>Brighter Days</h1>
  <p>Corp Filing Dashboard — Valentina Park MD, PC</p>
  <div class="progress-bar-container">
    <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
  </div>
  <div class="progress-text" id="progressText">Loading...</div>
</header>

<div class="container">
  <!-- Left: Checklist -->
  <div class="panel">
    <h2>Filing Checklist</h2>
    <div id="checklist"><div class="loading">Loading...</div></div>
    <button class="add-doc-btn" onclick="toggleAddForm()" id="addDocBtnChecklist" style="margin-top:12px;">+ Add Document</button>
  </div>

  <!-- Right: Document Vault -->
  <div class="panel" id="docPanel" style="display:none;">
    <h2>Document Vault</h2>
    <div id="docVault"></div>

    <button class="add-doc-btn" onclick="toggleAddForm()">+ Add Document</button>
    <div class="add-doc-form" id="addDocForm">
      <label>Linked Step</label>
      <select id="docStep"></select>

      <label>Document Name</label>
      <input type="text" id="docName" placeholder="e.g., Articles of Incorporation PDF">

      <label>Status</label>
      <select id="docStatus">
        <option value="needed">Needed</option>
        <option value="uploaded">Uploaded</option>
        <option value="filed">Filed</option>
      </select>

      <label>Link (optional)</label>
      <input type="text" id="docUrl" placeholder="https://...">

      <label>Notes (optional)</label>
      <textarea id="docNotes" placeholder="Any details..."></textarea>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="addDoc()">Save</button>
        <button class="btn btn-secondary" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ymejmufmaivocbwpadiy.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZWptdWZtYWl2b2Nid3BhZGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODA4NjUsImV4cCI6MjA5MDA1Njg2NX0.2ATuH-jQBy17jEHrt3k6q-Mjif7ZA0w74Q0WO-qfebc';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let steps = [];
  let docs = [];

  async function loadData() {
    const [stepsRes, docsRes] = await Promise.all([
      sb.from('corp_filing_steps').select('*').order('step_number'),
      sb.from('corp_filing_docs').select('*').order('created_at')
    ]);
    steps = stepsRes.data || [];
    docs = docsRes.data || [];
    render();
  }

  function render() {
    renderChecklist();
    renderDocs();
    renderProgress();
    renderStepDropdown();
  }

  function renderProgress() {
    const done = steps.filter(s => s.is_complete).length;
    const pct = steps.length ? Math.round((done / steps.length) * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = done + ' of ' + steps.length + ' steps complete (' + pct + '%)';
  }

  function renderChecklist() {
    const el = document.getElementById('checklist');
    if (!steps.length) { el.innerHTML = '<div class="empty">No steps found.</div>'; return; }
    el.innerHTML = steps.map(s => `
      <div class="step">
        <span class="step-number">${s.step_number}.</span>
        <input type="checkbox" ${s.is_complete ? 'checked' : ''} onchange="toggleStep(${s.id}, this.checked)">
        <div class="step-content">
          <div class="step-title ${s.is_complete ? 'done' : ''}">${esc(s.title)}</div>
          <div class="step-desc">${esc(s.description || '')}</div>
        </div>
      </div>
    `).join('');
  }

  function renderDocs() {
    const panel = document.getElementById('docPanel');
    const el = document.getElementById('docVault');
    const addBtnChecklist = document.getElementById('addDocBtnChecklist');
    if (!docs.length) { panel.style.display = 'none'; addBtnChecklist.style.display = 'block'; return; }
    panel.style.display = 'block';
    addBtnChecklist.style.display = 'none';

    const grouped = {};
    docs.forEach(d => {
      const step = steps.find(s => s.id === d.step_id);
      const key = step ? step.step_number + '. ' + step.title : 'General';
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(d);
    });

    el.innerHTML = Object.entries(grouped).map(([group, items]) => `
      <div class="doc-group">
        <div class="doc-group-title">${esc(group)}</div>
        ${items.map(d => `
          <div class="doc-item">
            <span class="doc-name">${d.url ? '<a href="' + esc(d.url) + '" target="_blank">' + esc(d.name) + '</a>' : esc(d.name)}</span>
            <select class="doc-status ${d.status}" onchange="updateDocStatus(${d.id}, this.value)">
              <option value="needed" ${d.status === 'needed' ? 'selected' : ''}>needed</option>
              <option value="uploaded" ${d.status === 'uploaded' ? 'selected' : ''}>uploaded</option>
              <option value="filed" ${d.status === 'filed' ? 'selected' : ''}>filed</option>
            </select>
            <button class="doc-delete" onclick="deleteDoc(${d.id})" title="Delete">×</button>
          </div>
          ${d.notes ? '<div class="doc-notes" style="margin-left:8px;margin-bottom:4px;">' + esc(d.notes) + '</div>' : ''}
        `).join('')}
      </div>
    `).join('');
  }

  function renderStepDropdown() {
    const el = document.getElementById('docStep');
    el.innerHTML = '<option value="">— General (no step) —</option>' +
      steps.map(s => `<option value="${s.id}">${s.step_number}. ${esc(s.title)}</option>`).join('');
  }

  async function toggleStep(id, checked) {
    await sb.from('corp_filing_steps').update({
      is_complete: checked,
      completed_at: checked ? new Date().toISOString() : null
    }).eq('id', id);
    await loadData();
  }

  async function updateDocStatus(id, status) {
    await sb.from('corp_filing_docs').update({ status }).eq('id', id);
    await loadData();
  }

  async function deleteDoc(id) {
    if (!confirm('Delete this document?')) return;
    await sb.from('corp_filing_docs').delete().eq('id', id);
    await loadData();
  }

  function toggleAddForm() {
    document.getElementById('addDocForm').classList.toggle('visible');
  }

  async function addDoc() {
    const name = document.getElementById('docName').value.trim();
    if (!name) { alert('Document name is required.'); return; }

    const stepId = document.getElementById('docStep').value;
    await sb.from('corp_filing_docs').insert({
      step_id: stepId ? parseInt(stepId) : null,
      name: name,
      status: document.getElementById('docStatus').value,
      url: document.getElementById('docUrl').value.trim() || null,
      notes: document.getElementById('docNotes').value.trim() || null
    });

    document.getElementById('docName').value = '';
    document.getElementById('docUrl').value = '';
    document.getElementById('docNotes').value = '';
    document.getElementById('addDocForm').classList.remove('visible');
    await loadData();
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  loadData();
</script>

</body>
</html>
